<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #afc6e9;
            text-align: center;
        }

        .container {
            width: 500px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #34495e;
        }

        .alert {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }

        .fraud {
            background-color: #e74c3c;
        }

        .safe {
            background-color: #2ecc71;
        }

        .info {
            margin-top: 15px;
            font-size: 14px;
        }

        .highlight {
            color: red;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Fraud Detection System</h1>

    <form method="POST" action="/predict">
        <textarea name="msg" rows="4" placeholder="Enter message here"></textarea><br>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}

        {% if "Fraud" in result %}
            <div class="alert fraud">
                ⚠️ Alert: Fraudulent Message Detected!
            </div>
        {% else %}
            <div class="alert safe">
                ✅ Safe Message
            </div>
        {% endif %}

        {% if score %}
            <p class="info">
                <b>Risk Score:</b> {{ score }}%
            </p>
        {% endif %}

        {% if explanation %}
            <div class="info">
                <b>Explanation:</b><br>
                {{ explanation }}
            </div>
        {% endif %}

    {% endif %}

</div>

</body>
</html>
